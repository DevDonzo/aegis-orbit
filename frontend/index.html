<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbital Collision Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="background-glow background-glow-a"></div>
    <div class="background-glow background-glow-b"></div>

    <main class="app-shell">
      <header class="hero glass-panel">
        <p class="eyebrow">Mission Operations UI</p>
        <h1>On-Orbit Collision Predictor</h1>
        <p class="subtitle">
          Secure, real-time conjunction risk scoring with orbital telemetry pairs.
        </p>
      </header>

      <section class="grid">
        <article class="card glass-panel">
          <h2>API & Auth</h2>
          <div class="field">
            <label for="baseUrl">Backend URL</label>
            <input id="baseUrl" type="url" value="http://localhost:8000" />
          </div>
          <div class="field-row">
            <div class="field">
              <label for="username">Username</label>
              <input id="username" type="text" value="mission_operator" />
            </div>
            <div class="field">
              <label for="password">Password</label>
              <input id="password" type="password" value="change-me-now" />
            </div>
          </div>
          <div class="actions">
            <button id="tokenBtn" class="btn primary">Get Access Token</button>
            <button id="presetBtn" class="btn ghost">Load Sample Data</button>
          </div>
          <p id="tokenStatus" class="status neutral">Not authenticated</p>
        </article>

        <article class="card glass-panel">
          <h2>Collision Risk Result</h2>
          <div class="gauge-wrap">
            <div id="probabilityGauge" class="gauge">
              <div class="gauge-inner">
                <p class="small-label">Probability</p>
                <p id="probabilityValue" class="big-value">--</p>
              </div>
            </div>
            <div class="result-meta">
              <p class="meta-label">Risk Band</p>
              <p id="riskBand" class="risk-pill risk-low">N/A</p>
              <p class="meta-label">Model Version</p>
              <p id="modelVersion" class="meta-value">--</p>
            </div>
          </div>
          <button id="predictBtn" class="btn primary wide">Predict Collision Risk</button>
          <p id="predictStatus" class="status neutral">Awaiting input</p>
        </article>
      </section>

      <section class="card glass-panel">
        <h2>Telemetry Pair</h2>
        <div class="object-grid">
          <div>
            <h3>Object A</h3>
            <div class="field"><label for="a_object_id">Object ID</label><input id="a_object_id" type="text" /></div>
            <div class="field"><label for="a_eccentricity">Eccentricity</label><input id="a_eccentricity" type="number" step="0.0001" /></div>
            <div class="field"><label for="a_inclination_deg">Inclination (deg)</label><input id="a_inclination_deg" type="number" step="0.01" /></div>
            <div class="field"><label for="a_raan_deg">RAAN (deg)</label><input id="a_raan_deg" type="number" step="0.01" /></div>
            <div class="field"><label for="a_arg_perigee_deg">Arg Perigee (deg)</label><input id="a_arg_perigee_deg" type="number" step="0.01" /></div>
            <div class="field"><label for="a_mean_anomaly_deg">Mean Anomaly (deg)</label><input id="a_mean_anomaly_deg" type="number" step="0.01" /></div>
            <div class="field"><label for="a_mean_motion_rev_per_day">Mean Motion (rev/day)</label><input id="a_mean_motion_rev_per_day" type="number" step="0.0001" /></div>
          </div>
          <div>
            <h3>Object B</h3>
            <div class="field"><label for="b_object_id">Object ID</label><input id="b_object_id" type="text" /></div>
            <div class="field"><label for="b_eccentricity">Eccentricity</label><input id="b_eccentricity" type="number" step="0.0001" /></div>
            <div class="field"><label for="b_inclination_deg">Inclination (deg)</label><input id="b_inclination_deg" type="number" step="0.01" /></div>
            <div class="field"><label for="b_raan_deg">RAAN (deg)</label><input id="b_raan_deg" type="number" step="0.01" /></div>
            <div class="field"><label for="b_arg_perigee_deg">Arg Perigee (deg)</label><input id="b_arg_perigee_deg" type="number" step="0.01" /></div>
            <div class="field"><label for="b_mean_anomaly_deg">Mean Anomaly (deg)</label><input id="b_mean_anomaly_deg" type="number" step="0.01" /></div>
            <div class="field"><label for="b_mean_motion_rev_per_day">Mean Motion (rev/day)</label><input id="b_mean_motion_rev_per_day" type="number" step="0.0001" /></div>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="closest_approach_km">Closest Approach (km)</label>
            <input id="closest_approach_km" type="number" step="0.001" />
          </div>
          <div class="field">
            <label for="relative_velocity_kms">Relative Velocity (km/s)</label>
            <input id="relative_velocity_kms" type="number" step="0.001" />
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
